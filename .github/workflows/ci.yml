name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD
          git clean -ffdx

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev

      - name: Setup Rust
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            . "$HOME/.cargo/env"
          fi

          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable
          rustc --version
          cargo --version

      - name: Setup Node
        run: |
          if command -v node >/dev/null 2>&1; then
            NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          else
            NODE_MAJOR=0
          fi

          if [ "$NODE_MAJOR" -lt 22 ]; then
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          node --version
          npm --version

      - name: Install JS dependencies
        run: npm ci --prefix js

      - name: Rust format
        run: cargo fmt --check

      - name: Rust check
        run: cargo check --workspace --all-features

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Workspace dependency direction
        run: node scripts/check-workspace-deps.js

      - name: File line report
        run: node scripts/report-file-lines.js

      - name: File line report self-test
        run: node scripts/report-file-lines.js --self-test

      - name: UI accessibility check
        run: node scripts/check-ui-a11y.js

      - name: UI accessibility check self-test
        run: node scripts/check-ui-a11y.js --self-test

      - name: Performance fixture generator self-test
        run: node scripts/generate-perf-fixtures.js --self-test

      - name: Performance smoke checker self-test
        run: node scripts/check-perf-smoke.js --self-test

      - name: Performance documentation check
        run: node scripts/check-perf-docs.js

      - name: Performance documentation check self-test
        run: node scripts/check-perf-docs.js --self-test

      - name: Editor JS build
        run: npm --prefix js run build

      - name: Editor JS tests
        run: npm --prefix js test

      - name: Markdown style smoke
        run: node scripts/check-markdown-style-smoke.js

      - name: Tiptap release smoke
        run: node scripts/check-tiptap-release-smoke.js

      - name: Tiptap runtime smoke
        run: node scripts/check-tiptap-runtime-smoke.js

      - name: Editor bundle consistency
        run: |
          cmp assets/editor.js apps/desktop/assets/editor.js
          cmp assets/editor.js apps/mobile/assets/editor.js
